<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SkyClouds Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">SkyClouds</div>
    </header>

    <main>
        <section class="product-grid">
            <div class="card">
                <img src="lego-set.jpg" alt="Lego">
                <h3>Lego Technic Marvel</h3>
                <p class="price">89.99 €</p>
                <button class="buy-button" onclick="orderProduct('Lego Technic Marvel', '89.99 €')">
                    Заказать в Telegram
                </button>
            </div>

            <div class="card">
                <img src="headphones.jpg" alt="Headphones">
                <h3>Air Pods 4 ANC</h3>
                <p class="price">120.00 €</p>
                <button class="buy-button" onclick="orderProduct('Air Pods 4 ANC', '120.00 €')">
                    Заказать в Telegram
                </button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
