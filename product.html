<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">SkyClouds</div>
        <a href="index.html" class="back-btn">← Back to Store</a>
    </nav>

    <div class="product-page">
        <img id="prodImg" src="" alt="Product">
        <h1 id="prodName">Loading...</h1>
        <p id="prodDesc" class="desc"></p>
        <p class="price" id="prodPrice"></p>
        <div class="actions">
            <button class="buy-button" id="buyBtn">Order in Telegram</button>
            <button class="add-btn" id="addCartBtn">Add to Cart</button>
        </div>
    </div>

    <script src="details.js"></script>
</body>
</html>
