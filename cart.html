<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart | SkyClouds</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">SkyClouds</div>
        <a href="index.html" class="back-btn">← Back to Store</a>
    </nav>

    <main style="max-width: 800px; margin: 40px auto; width: 90%;">

        <div id="cartItems"></div>

        <button class="buy-button" onclick="checkout()" style="margin-top: 30px;">Checkout in Telegram</button>
    </main>

    <script src="cart.js"></script>
</body>
</html>
